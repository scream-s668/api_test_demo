name: API Tests # 界面名称
#触发条件
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest #运行环境
    #检查代码
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
  #设置python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
#安装依赖
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r config/req.txt   # 如果你的依赖文件名是 req.txt，按实际路径修改
#运行测试
    - name: Run tests
      run: |
        cd config   # 进入测试文件所在目录（因为你的测试文件在 config 子目录下）
        pytest -v --html=report.html --self-contained-html
#上传报告
    - name: Upload test report
      uses: actions/upload-artifact@v3
      with:
        name: pytest-report
        path: config/report.html
